services:
  app:
    build: .
    container_name: lottery_app
    restart: on-failure
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DATABASE_URL: jdbc:postgresql://db:5432/lottery?user=lotteryowner&password=admin
      JWT_SECRET: super-secret-key
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: admin123
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "java -jar app.jar"

  db:
    image: postgres:16
    container_name: lottery_db
    restart: always
    environment:
      POSTGRES_DB: lottery
      POSTGRES_USER: lotteryowner
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lotteryowner -d lottery"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: